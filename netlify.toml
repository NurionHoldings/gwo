# Global Workforce Operations — Netlify (GitHub 연동 정적 배포)
# 저장소 루트 = gwo-template 폴더 기준

[build]
  publish = "."
  # 빌드 없음: HTML·CSS·JSON 정적 사이트 (로케일은 저장소에 포함)

[build.environment]
  NODE_VERSION = "20"

# 도메인 리다이렉트는 netlify.toml이 아니라 Netlify UI에서만 설정하세요.
# (toml apex→www + UI www→apex 동시 적용 시 ERR_TOO_MANY_REDIRECTS 발생)

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
